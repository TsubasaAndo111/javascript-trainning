<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>清一色 待ち当てタイムアタック</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="clock-container">
      <span id="clock-time">00:00:00</span>
    </div>

    <div id="app-container">
      <div id="screen-start">
        <h2>清一色 何待ち？<br />タイムアタック (60秒)</h2>
        <div style="margin-top: 30px">
          <button
            id="btn-start"
            class="submit-btn"
            style="
              background-color: #ff9800;
              font-size: 24px;
              padding: 15px 40px;
              display: block;
              margin: 0 auto 20px;
            "
          >
            ゲームスタート
          </button>
          <button
            id="btn-show-ranking"
            class="submit-btn"
            style="background-color: #607d8b; display: block; margin: 0 auto"
          >
            ランキングを見る
          </button>
        </div>
      </div>

      <div id="screen-game" style="display: none">
        <div
          id="game-info"
          style="
            display: flex;
            justify-content: space-around;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            background-color: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
          "
        >
          <div>スコア: <span id="score-display">0</span></div>
          <div>残り時間: <span id="time-display">60</span>秒</div>
        </div>

        <div
          id="hand-display"
          style="margin-bottom: 30px; min-height: 70px"
        ></div>
        <hr style="border: 1px solid #ddd; margin: 20px 0" />

        <h3>待ち牌を選んでください</h3>

        <div
          class="controls-container"
          style="
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 10px;
            margin-bottom: 20px;
          "
        >
          <div id="wait-selection" style="display: flex; gap: 5px"></div>

          <button id="noten-btn">ノーテン</button>
        </div>

        <button id="submit-btn" class="submit-btn">回答する</button>
        <div
          id="result-message"
          style="
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            min-height: 36px;
          "
        ></div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

      <div id="screen-ranking" style="display: none; text-align: center">
        <h2>トレーニング記録</h2>

        <div style="width: 100%; max-width: 600px; margin: 0 auto 30px">
          <canvas id="growth-chart"></canvas>
        </div>

        <h3>歴代自己ベスト TOP 3</h3>
        <div
          id="ranking-list"
          style="
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
            display: inline-block;
            text-align: left;
          "
        ></div>

        <div style="margin-top: 20px">
          <button id="btn-back-start" class="submit-btn">タイトルへ戻る</button>
        </div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
